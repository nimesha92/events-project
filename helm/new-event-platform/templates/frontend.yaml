{{- if .Values.frontend.enabled }}

apiVersion: apps/v1
kind: Deployment

metadata:
  name: event-frontend
  labels:
    app: event-frontend

spec:
  replicas: {{ .Values.frontend.replicas }}

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: event-frontend

  template:
    metadata:
      labels:
        app: event-frontend

    spec:
      containers:
        - name: event-frontend

          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"

          imagePullPolicy: {{ .Values.global.imagePullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
              protocol: TCP

          readinessProbe:
            httpGet:
              path: {{ .Values.frontend.readinessPath }}
              port: http

            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: {{ .Values.frontend.livenessPath }}
              port: http

            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
{{ toYaml .Values.frontend.resources | indent 12 }}

---

apiVersion: v1
kind: Service

metadata:
  name: event-frontend
  labels:
    app: event-frontend

spec:
  type: ClusterIP

  selector:
    app: event-frontend

  ports:
    - name: http
      port: {{ .Values.frontend.port }}
      targetPort: http
      protocol: TCP

{{- end }}