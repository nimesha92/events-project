{{- if .Values.analyticsService.enabled }}

apiVersion: apps/v1
kind: Deployment

metadata:
  name: analytics-service
  labels:
    app: analytics-service

spec:
  replicas: {{ .Values.analyticsService.replicas }}

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: analytics-service

  template:
    metadata:
      labels:
        app: analytics-service

    spec:
      containers:
        - name: analytics-service

          image: "{{ .Values.analyticsService.image.repository }}:{{ .Values.analyticsService.image.tag }}"

          imagePullPolicy: {{ .Values.global.imagePullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.analyticsService.port }}
              protocol: TCP

          envFrom:
            - configMapRef:
                name: platform-config

            - secretRef:
                name: platform-secrets

          readinessProbe:
            httpGet:
              path: {{ .Values.analyticsService.readinessPath }}
              port: http

            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: {{ .Values.analyticsService.livenessPath }}
              port: http

            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
{{ toYaml .Values.analyticsService.resources | indent 12 }}

---

apiVersion: v1
kind: Service

metadata:
  name: analytics-service
  labels:
    app: analytics-service

spec:
  type: ClusterIP

  selector:
    app: analytics-service

  ports:
    - name: http
      port: {{ .Values.analyticsService.port }}
      targetPort: http
      protocol: TCP

{{- end }}