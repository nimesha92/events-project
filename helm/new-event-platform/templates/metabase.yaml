apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: metabase-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  labels:
    app: metabase
spec:
  replicas: 1   # Metabase's default embedded H2 app-db is single-writer; don't scale this beyond 1
  selector:
    matchLabels:
      app: metabase
  template:
    metadata:
      labels:
        app: metabase
    spec:
      containers:
        - name: metabase
          image: metabase/metabase:v0.54.10
          ports:
            - containerPort: 3000
          env:
            - name: MB_DB_FILE
              value: /metabase-data/metabase.db
          volumeMounts:
            - name: metabase-data
              mountPath: /metabase-data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 30   # up to (20 + 30*10) = 320s to boot before it's considered failed
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 15
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
      volumes:
        - name: metabase-data
          persistentVolumeClaim:
            claimName: metabase-data
---
apiVersion: v1
kind: Service
metadata:
  name: metabase
spec:
  type: ClusterIP
  selector:
    app: metabase
  ports:
    - port: 80
      targetPort: 3000
