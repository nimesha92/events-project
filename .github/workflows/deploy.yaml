name: deploy-dev

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "helm/new-event-platform/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'default' }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
  HELM_RELEASE: new-event-platform
  HELM_CHART: ./helm/new-event-platform

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Verify AWS connection
        run: |
          aws sts get-caller-identity

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Test EKS connection
        run: |
          aws eks update-kubeconfig \
          --region "$AWS_REGION" \
          --name "$EKS_CLUSTER_NAME"

          kubectl get nodes
          kubectl get pods -n "$K8S_NAMESPACE"

      - name: Set short SHA
        id: vars
        run: echo "short_sha=$(echo $GITHUB_SHA | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker images
        shell: bash
        run: |
          set -e

          SHORT_SHA="${{ steps.vars.outputs.short_sha }}"

          docker build \
            -t "$ECR_REGISTRY/new-events/events:$SHORT_SHA" \
            ./services/event-service
          docker push "$ECR_REGISTRY/new-events/events:$SHORT_SHA"

          docker build \
            -t "$ECR_REGISTRY/new-events/program:$SHORT_SHA" \
            ./services/program-service
          docker push "$ECR_REGISTRY/new-events/program:$SHORT_SHA"

          docker build \
            -t "$ECR_REGISTRY/new-events/registration:$SHORT_SHA" \
            ./services/registration-service
          docker push "$ECR_REGISTRY/new-events/registration:$SHORT_SHA"

          docker build \
            -t "$ECR_REGISTRY/new-events/analytics:$SHORT_SHA" \
            ./services/analytics-service
          docker push "$ECR_REGISTRY/new-events/analytics:$SHORT_SHA"


      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install kubectl
    
        uses: azure/setup-kubectl@v4

      - name: Select Blue or Green
        id: colour
        shell: bash
        run: |
          if kubectl get service event-service \
            -n "$K8S_NAMESPACE" >/dev/null 2>&1; then

            ACTIVE=$(kubectl get service event-service \
              -n "$K8S_NAMESPACE" \
              -o jsonpath='{.spec.selector.version}')

            if [ "$ACTIVE" = "blue" ]; then
              TARGET="green"
            else
              TARGET="blue"
            fi

            INITIAL="false"
          else
            ACTIVE="blue"
            TARGET="blue"
            INITIAL="true"
          fi

          echo "active=$ACTIVE" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "initial=$INITIAL" >> "$GITHUB_OUTPUT"

          echo "Active colour: $ACTIVE"
          echo "Deployment colour: $TARGET"

      - name: Deploy inactive environment with Helm
        shell: bash
        env:
          ACTIVE: ${{ steps.colour.outputs.active }}
          TARGET: ${{ steps.colour.outputs.target }}
          INITIAL: ${{ steps.colour.outputs.initial }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LAMBDA_FUNCTION_URL: ${{ secrets.LAMBDA_FUNCTION_URL }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
        run: |
          set -e

          COMMON_VALUES=(
            --namespace "$K8S_NAMESPACE"
            --set-string database.url="$DATABASE_URL"
            --set-string lambda.functionUrl="$LAMBDA_FUNCTION_URL"
            --set-string clickhouse.password="$CLICKHOUSE_PASSWORD"
            --set-string eventService.image.repository="$ECR_REGISTRY/new-events/events"
            --set-string programService.image.repository="$ECR_REGISTRY/new-events/program"
            --set-string registrationService.image.repository="$ECR_REGISTRY/new-events/registration"
            --set-string analyticsService.image.repository="$ECR_REGISTRY/new-events/analytics"
          )

          if [ "$INITIAL" = "true" ]; then
            helm upgrade --install "$HELM_RELEASE" "$HELM_CHART" \
              "${COMMON_VALUES[@]}" \
              --set-string blueGreen.activeColor=blue \
              --set-string eventService.image.blueTag="$GITHUB_SHA" \
              --set-string eventService.image.greenTag="$GITHUB_SHA" \
              --set-string programService.image.blueTag="$GITHUB_SHA" \
              --set-string programService.image.greenTag="$GITHUB_SHA" \
              --set-string registrationService.image.blueTag="$GITHUB_SHA" \
              --set-string registrationService.image.greenTag="$GITHUB_SHA" \
              --set-string analyticsService.image.blueTag="$GITHUB_SHA" \
              --set-string analyticsService.image.greenTag="$GITHUB_SHA" \
              --wait \
              --timeout 10m \
              --rollback-on-failure
          else
            helm upgrade "$HELM_RELEASE" "$HELM_CHART" \
              "${COMMON_VALUES[@]}" \
              --reuse-values \
              --set-string blueGreen.activeColor="$ACTIVE" \
              --set-string eventService.image.${TARGET}Tag="$GITHUB_SHA" \
              --set-string programService.image.${TARGET}Tag="$GITHUB_SHA" \
              --set-string registrationService.image.${TARGET}Tag="$GITHUB_SHA" \
              --set-string analyticsService.image.${TARGET}Tag="$GITHUB_SHA" \
              --wait \
              --timeout 10m \
              --rollback-on-failure
          fi
