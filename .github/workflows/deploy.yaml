name: deploy-dev

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "helm/new-event-platform/**"
      - ".github/workflows/four-services-helm-blue-green.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'default' }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
  HELM_RELEASE: new-event-platform
  HELM_CHART: ./helm/new-event-platform

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Debug OIDC claims
        run: |
          curl -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value' > token.txt
          
          # Decode the JWT payload (2nd segment) without verifying signature
          cat token.txt | cut -d '.' -f2 | base64 -d 2>/dev/null | jq .

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Verify AWS connection
        run: |
          aws sts get-caller-identity