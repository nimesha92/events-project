name: deploy-dev

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - "helm/new-event-platform/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE || 'default' }}
  ECR_REGISTRY: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
  HELM_RELEASE: newnets
  HELM_CHART: ./helm/new-event-platform

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: events
            context: ./services/event-service
          - name: program
            context: ./services/program-service
          - name: registration
            context: ./services/registration-service
          - name: analytics
            context: ./services/analytics-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: vars
        shell: bash
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build ${{ matrix.name }} image
        shell: bash
        run: |
          docker build \
            -t "$ECR_REGISTRY/new-events/${{ matrix.name }}:${{ steps.vars.outputs.tag }}" \
            "${{ matrix.context }}"

      - name: Scan ${{ matrix.name }} image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ env.ECR_REGISTRY }}/new-events/${{ matrix.name }}:${{ steps.vars.outputs.tag }}'
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Push ${{ matrix.name }} image
        shell: bash
        run: |
          docker push \
            "$ECR_REGISTRY/new-events/${{ matrix.name }}:${{ steps.vars.outputs.tag }}"


  deploy:
    needs: build-scan-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Connect to EKS
        shell: bash
        run: |
          aws sts get-caller-identity

          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$EKS_CLUSTER_NAME"

          kubectl get nodes

      - name: Set image tag
        id: vars
        shell: bash
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Select Blue or Green
        id: colour
        shell: bash
        run: |
          if helm status "$HELM_RELEASE" \
            -n "$K8S_NAMESPACE" >/dev/null 2>&1; then

            ACTIVE=$(kubectl get service event-service \
              -n "$K8S_NAMESPACE" \
              -o jsonpath='{.spec.selector.version}')

            if [ "$ACTIVE" = "blue" ]; then
              TARGET="green"
            else
              TARGET="blue"
            fi

            INITIAL="false"
          else
            ACTIVE="blue"
            TARGET="blue"
            INITIAL="true"
          fi

          echo "active=$ACTIVE" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "initial=$INITIAL" >> "$GITHUB_OUTPUT"

          echo "Active colour: $ACTIVE"
          echo "Deployment colour: $TARGET"
          echo "Initial deployment: $INITIAL"

      - name: Deploy inactive environment with Helm
        shell: bash
        env:
          ACTIVE: ${{ steps.colour.outputs.active }}
          TARGET: ${{ steps.colour.outputs.target }}
          INITIAL: ${{ steps.colour.outputs.initial }}
          IMAGE_TAG: ${{ steps.vars.outputs.tag }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          LAMBDA_FUNCTION_URL: ${{ secrets.LAMBDA_FUNCTION_URL }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CLICKHOUSE_PASSWORD }}
        run: |
          set -euo pipefail

          COMMON_VALUES=(
            --namespace "$K8S_NAMESPACE"
            --create-namespace
            --set-string database.url="$DATABASE_URL"
            --set-string lambda.functionUrl="$LAMBDA_FUNCTION_URL"
            --set-string clickhouse.password="$CLICKHOUSE_PASSWORD"
            --set-string eventService.image.repository="$ECR_REGISTRY/new-events/events"
            --set-string programService.image.repository="$ECR_REGISTRY/new-events/program"
            --set-string registrationService.image.repository="$ECR_REGISTRY/new-events/registration"
            --set-string analyticsService.image.repository="$ECR_REGISTRY/new-events/analytics"
          )

          if [ "$INITIAL" = "true" ]; then
            helm upgrade --install "$HELM_RELEASE" "$HELM_CHART" \
              "${COMMON_VALUES[@]}" \
              --set-string blueGreen.activeColor=blue \
              --set-string eventService.image.blueTag="$IMAGE_TAG" \
              --set-string eventService.image.greenTag="$IMAGE_TAG" \
              --set-string programService.image.blueTag="$IMAGE_TAG" \
              --set-string programService.image.greenTag="$IMAGE_TAG" \
              --set-string registrationService.image.blueTag="$IMAGE_TAG" \
              --set-string registrationService.image.greenTag="$IMAGE_TAG" \
              --set-string analyticsService.image.blueTag="$IMAGE_TAG" \
              --set-string analyticsService.image.greenTag="$IMAGE_TAG" \
              --wait \
              --timeout 10m \
              --rollback-on-failure
          else
            helm upgrade --install "$HELM_RELEASE" "$HELM_CHART" \
              "${COMMON_VALUES[@]}" \
              --reuse-values \
              --set-string blueGreen.activeColor="$ACTIVE" \
              --set-string eventService.image.${TARGET}Tag="$IMAGE_TAG" \
              --set-string programService.image.${TARGET}Tag="$IMAGE_TAG" \
              --set-string registrationService.image.${TARGET}Tag="$IMAGE_TAG" \
              --set-string analyticsService.image.${TARGET}Tag="$IMAGE_TAG" \
              --wait \
              --timeout 10m \
              --rollback-on-failure
          fi

      - name: Verify deployment
        shell: bash
        run: |
          kubectl get pods -n "$K8S_NAMESPACE"
          kubectl get services -n "$K8S_NAMESPACE"
          helm status "$HELM_RELEASE" -n "$K8S_NAMESPACE"